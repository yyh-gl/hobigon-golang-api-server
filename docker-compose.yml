services:
  rest:
    build:
      context: .
      target: builder
      dockerfile: ./docker/rest/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/go/src/github.com/yyh-gl/hobigon-golang-api-server
    working_dir: /go/src/github.com/yyh-gl/hobigon-golang-api-server
    command: [ "sh", "-c", "air -c .air.rest.toml" ]
    environment:
      APP_ENV: "develop"
    env_file:
      - .env.local
    depends_on:
      - db

  graphql:
    build:
      context: .
      target: builder
      dockerfile: ./docker/graphql/Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - .:/go/src/github.com/yyh-gl/hobigon-golang-api-server
    working_dir: /go/src/github.com/yyh-gl/hobigon-golang-api-server
    command: [ "sh", "-c", "air -c .air.graphql.toml" ]
    environment:
      APP_ENV: "develop"
    env_file:
      - .env.local
    depends_on:
      - db
  
  db:
    image: mysql:8
    ports:
      - "13306:3306"
    volumes:
      - ./docker/mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: "mysql"
      MYSQL_DATABASE: "hobigon"
    security_opt:
      - seccomp:unconfined
